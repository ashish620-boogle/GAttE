seed: 42
paths:
  data_dir: data
  raw_dir: data/raw
  processed_dir: data/processed
  cache_dir: data/cache
  outputs_dir: outputs

dataset:
  dataverse_doi: doi:10.7910/DVN/LOTEGM
  country_code: US
  preprocessed_geo_file: data/processed/geo_data_full.csv
  prefer_preprocessed_geo: true

geocode:
  username_env: GEONAMES_USERNAME
  rate_limit_env: GEONAMES_RATE_LIMIT
  rate_limit: 1.0
  round: 4
  disambiguate_by_admin: false
  verify_ssl: false
  allow_insecure_fallback: true
  fill_missing: false

preprocess:
  min_text_len: 3
  min_class_count: 80
  max_class_count: 500
  target_class_count: 66
  class_selection: most_frequent
  remove_non_alnum: true
  keep_emojis: false
  lowercase: false
  vectorizer_lowercase: true
  vocab_from: train
  max_words: 32
  char_length_percentile: 98

split:
  train_size: 0.6
  val_size: 0.2
  test_size: 0.2
  random_state: 42
  stratify: false

model:
  use_url: https://tfhub.dev/google/universal-sentence-encoder/4
  use_sentence_embedding: true
  use_word_embedding: true
  use_char_embedding: true
  no_attention_mode: concat_qv
  variant: colab_v4
  word_dim: 1024
  char_dim: 25
  dense_units: 640
  timesteps: 32
  deconv_filters: [1024, 256]
  q_filters: 256
  num_heads: 1024
  key_dim: 2
  value_dim: 2
  dropout_rates: [0.3, 0.6]
  l1: 0.001
  l2: 0.000001
  use_deconv: true
  use_attention: true
  use_activity_regularizer: true
  activity_l1: 0.001
  activity_l2: 0.000001

train:
  batch_size: 256
  epochs: 15
  lr: 0.001
  lr_patience: 2
  kfolds: 20
  use_precomputed: true
  from_logits_loss: false
  resume_if_exists: true

mgatte:
  regression_loss_weight: 1.0

bert:
  model_name: bert-base-uncased
  max_len: 128
  batch_size: 16
  epochs: 3
  lr: 0.00002

spacy:
  model: en_core_web_trf
  labels: [LOC, FAC, ORG, GPE]

eval:
  k_values: [1,5,10,15,20,25,30,35]

viz:
  dpi: 150
